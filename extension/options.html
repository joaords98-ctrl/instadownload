<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Configurações - InstaDownload Pessoal</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #f6f7fb; color: #101828; }
    main { width: min(760px, calc(100% - 32px)); margin: 40px auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 24px; padding: 24px; box-shadow: 0 18px 60px rgba(16,24,40,.08); }
    h1 { margin: 0 0 8px; letter-spacing: -0.04em; }
    p { color: #667085; }
    label { display: block; font-weight: 800; margin-top: 18px; }
    input { width: 100%; border: 1px solid #e5e7eb; border-radius: 14px; padding: 12px 14px; margin-top: 8px; font: inherit; }
    button { margin-top: 18px; border: 0; background: #111827; color: #fff; padding: 12px 16px; border-radius: 14px; font-weight: 900; cursor: pointer; }
    .msg { margin-top: 12px; color: #027a48; font-weight: 800; }
    code { background: #f2f4f7; padding: 2px 6px; border-radius: 8px; }
  </style>
</head>
<body>
  <main>
    <h1>Configurações</h1>
    <p>Informe a URL do painel web. Use a URL gerada pela Vercel ou o endereço local de teste.</p>

    <label>URL do painel</label>
    <input id="dashboardUrl" placeholder="https://seu-painel.vercel.app ou http://localhost:5173" />

    <p>Para rodar local: abra a pasta do projeto e execute <code>python -m http.server 5173</code>.</p>

    <button id="saveBtn">Salvar</button>
    <div id="msg" class="msg"></div>
  </main>
  <script src="options.js"></script>
</body>
</html>
