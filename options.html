<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Configurações - Reels Library</title>
  <style>
    body { margin: 0; background: #f6f7fb; color: #172033; font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { max-width: 760px; margin: 48px auto; padding: 24px; background: #fff; border: 1px solid #e5e8f0; border-radius: 18px; box-shadow: 0 10px 30px rgba(20,31,58,.08); }
    h1 { margin-top: 0; letter-spacing: -.04em; }
    label { display: grid; gap: 8px; font-weight: 800; margin: 16px 0; }
    input { padding: 12px; border: 1px solid #e5e8f0; border-radius: 12px; font: inherit; }
    button { border: 0; border-radius: 12px; padding: 12px 16px; background: #22345f; color: #fff; font-weight: 800; cursor: pointer; }
    .muted { color: #657089; }
    .ok { color: #166534; font-weight: 700; }
  </style>
</head>
<body>
  <main>
    <h1>Configurações</h1>
    <p class="muted">Este MVP salva tudo localmente no Chrome. A integração com backend fica preparada para a próxima fase.</p>

    <label>
      URL do backend local/opcional
      <input id="backendUrl" placeholder="http://localhost:3000" />
    </label>

    <button id="saveBtn">Salvar configurações</button>
    <p id="status" class="ok"></p>
  </main>
  <script src="options.js"></script>
</body>
</html>
